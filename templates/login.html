{% extends "base.html" %}
{% block content %}

<div style="max-width: 500px; margin: 0 auto;">
    <div class="card">
        <div class="card-header">
            🔐 Login to Your Account
        </div>
        <div class="card-body">
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div style="background: rgba(239, 68, 68, 0.1); color: var(--danger); padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center;">
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-input" required placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" required placeholder="Enter your password">
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                    Login
                </button>
            </form>

            <p style="text-align: center; margin-top: 20px; color: var(--text-secondary);">
                Don't have an account? 
                <a href="{{ url_for('register') }}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Register here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
